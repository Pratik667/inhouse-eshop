name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  code-quality:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'             # caches node_modules for faster runs

      - name: Install dependencies
        run: npm ci                # ci is faster & stricter than npm install

      - name: Check Prettier formatting
        run: npm run format:check  # fails if code is not formatted

      - name: Run ESLint
        run: npm run lint          # fails if code violates rules

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: code-quality            # tests only run if lint/format passes ✅

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_URL: ${{ secrets.DB_URL }}